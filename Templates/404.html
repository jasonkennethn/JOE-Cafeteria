{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — JOE Cafeteria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fff7ed 50%, #fef2f2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            animation: fadeUp 0.8s ease backwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-code {
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 900;
            background: linear-gradient(135deg, #fb923c, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
            position: relative;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, #fb923c, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem auto;
            box-shadow: 0 20px 60px rgba(251, 146, 60, 0.3);
            animation: iconBounce 2s ease-in-out infinite;
        }
        @keyframes iconBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error-icon i { font-size: 2rem; color: white; }
        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0.75rem;
        }
        p {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #fb923c, #ea580c);
            color: white;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(251, 146, 60, 0.3);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(251, 146, 60, 0.4);
        }
        .back-btn:active { transform: scale(0.96); }
        /* Floating food emojis */
        .float-emoji {
            position: fixed;
            font-size: 2rem;
            opacity: 0.12;
            animation: floatUp 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }
    </style>
</head>
<body>
    <div class="float-emoji" style="top:15%;left:8%;animation-delay:0s;">🍕</div>
    <div class="float-emoji" style="top:60%;left:5%;animation-delay:2s;">🍔</div>
    <div class="float-emoji" style="top:30%;right:10%;animation-delay:1s;">☕</div>
    <div class="float-emoji" style="top:70%;right:8%;animation-delay:3s;">🍰</div>
    <div class="float-emoji" style="bottom:15%;left:50%;animation-delay:1.5s;">🥗</div>

    <div class="error-container">
        <div class="error-icon">
            <i class="bi bi-compass"></i>
        </div>
        <div class="error-code">404</div>
        <h1>Oops! Page Not Found</h1>
        <p>Looks like this page took a detour to the kitchen and never came back. Let's get you back to the menu.</p>
        <a href="/" class="back-btn">
            <i class="bi bi-house-door-fill"></i> Back to Menu
        </a>
    </div>
</body>
</html>

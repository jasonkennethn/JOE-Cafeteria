<!-- Global QR Scanner Modal -->
<div id="qr-modal" class="fixed inset-0 z-[1200] hidden flex flex-col items-center justify-center p-4 bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0">
    <div class="glass-panel rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden transform transition-all duration-300 scale-95 flex flex-col max-h-[90vh] relative p-6">
        <button onclick="toggleQRModal()" class="absolute top-4 right-4 z-[100] bg-gray-100/20 hover:bg-gray-200/40 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all">
            <i class="bi bi-x-lg text-lg leading-none"></i>
        </button>
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-white m-0 tracking-tight">Scan Order QR</h2>
            <p class="text-xs text-gray-300 mt-1 uppercase tracking-widest">Hold code to camera</p>
        </div>
        
        <!-- Camera Reader Viewport -->
        <div class="relative w-full aspect-square rounded-[2rem] overflow-hidden bg-black/50 border-2 border-white/20 shadow-inner flex items-center justify-center" id="reader-container">
            <div id="reader" style="width: 100%; height: 100%;"></div>
            
            <!-- Scanning animation overlay -->
            <div class="absolute inset-x-0 top-0 h-1 bg-brand opacity-80 shadow-[0_0_20px_4px_#fb923c] animate-[scan_2s_ease-in-out_infinite] z-20 pointer-events-none"></div>
        </div>
        <style>
            @keyframes scan {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(100cqh); }
            }
        </style>

        <div id="scan-feedback" class="mt-4 p-4 rounded-xl text-center hidden font-bold text-sm tracking-wide transition-all duration-300"></div>
        <audio id="scan-beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    </div>
</div>

<!-- Global Scanned Order Action Modal -->
<div id="scanned-order-modal" class="fixed inset-0 z-[1300] hidden flex flex-col items-center justify-center p-4 bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0">
    <div class="glass-panel rounded-[2.5rem] shadow-2xl w-full max-w-lg overflow-hidden transform transition-all duration-300 scale-95 flex flex-col max-h-[90vh] relative p-6 bg-white dark:bg-gray-800">
        <button onclick="closeScannedModal()" class="absolute top-4 right-4 z-[100] bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-white w-10 h-10 rounded-full flex items-center justify-center transition-all">
            <i class="bi bi-x-lg text-lg leading-none"></i>
        </button>
        <div class="mb-6 border-b border-gray-100 dark:border-gray-700 pb-4">
            <span class="text-[10px] font-black text-brand uppercase tracking-[0.2em] block mb-1" id="scanned-modal-order-id">Scanned Order</span>
            <h2 class="text-2xl font-black text-gray-900 dark:text-white m-0 tracking-tight" id="scanned-modal-customer">Customer Name</h2>
        </div>
        
        <div class="flex-1 overflow-y-auto pr-2 mb-6" id="scanned-modal-items-container">
            <!-- Items populated via JS -->
        </div>
        
        <div class="mt-auto">
            <button onclick="closeScannedModal()" class="w-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 hover:dark:bg-gray-700 text-gray-900 dark:text-white rounded-2xl py-3 font-bold transition-all shadow-sm">Done</button>
        </div>
    </div>
</div>

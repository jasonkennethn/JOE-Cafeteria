{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — JOE Cafeteria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #fef2f2 0%, #fff1f2 50%, #fef3c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
            animation: fadeUp 0.8s ease backwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-code {
            font-size: clamp(6rem, 18vw, 10rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem auto;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3);
            animation: shake 3s ease-in-out infinite;
        }
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            10% { transform: rotate(-5deg); }
            20% { transform: rotate(5deg); }
            30% { transform: rotate(0deg); }
        }
        .error-icon i { font-size: 2rem; color: white; }
        h1 { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-bottom: 0.75rem; }
        p { color: #64748b; font-size: 0.95rem; font-weight: 500; line-height: 1.6; margin-bottom: 2rem; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #fb923c, #ea580c);
            color: white;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(251, 146, 60, 0.3);
            transition: all 0.3s ease;
        }
        .back-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(251, 146, 60, 0.4); }
        .back-btn:active { transform: scale(0.96); }
        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1e293b;
            padding: 14px 32px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            margin-left: 12px;
        }
        .login-btn:hover { border-color: #fb923c; color: #ea580c; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <div class="error-code">403</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to access this page. This area might be restricted to specific staff roles. Please log in with an authorized account.</p>
        <div>
            <a href="/" class="back-btn">
                <i class="bi bi-house-door-fill"></i> Back to Menu
            </a>
            <a href="/login/" class="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
        </div>
    </div>
</body>
</html>
